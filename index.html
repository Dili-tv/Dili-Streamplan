<script>
function getWeekRange() {

  const today = new Date();
  const day = today.getDay();

  const monday = new Date(today);

  // Montag der aktuellen Woche berechnen
  const diff = today.getDate() - day + (day === 0 ? -6 : 1);
  monday.setDate(diff);

  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);

  const format = (date) =>
    date.toLocaleDateString("de-DE", {
      day: "2-digit",
      month: "2-digit",
      year: "numeric"
    });

  document.getElementById("weekRange").textContent =
    format(monday) + " – " + format(sunday);
}

getWeekRange();

const streamplan = [
  {
    tag: "Montag",
    datum: "23.o3.2o26",
    streams: [
    {
      zeit: "08:00 Uhr",
      titel: "Just Chatting",
      bild: "https://static-cdn.jtvnw.net/ttv-boxart/509658-144x192.jpg"
    },
    {
      zeit: "09:00 Uhr",
      titel: "CO-WORKING",
      bild: "https://static-cdn.jtvnw.net/ttv-boxart/1599346425-144x192.jpg"
    },
    {
      zeit: "10:00 Uhr",
      titel: "POKOPIA",
      bild: "https://static-cdn.jtvnw.net/ttv-boxart/1329153872_IGDB-144x192.jpg"
    }
  ]
},
  
  {
    tag: "Dienstag",
    datum: "24.o3.2o26",
    streams: [
    {
      zeit: "08:00 Uhr",
      titel: "JUST CHATTING",
      bild: "https://static-cdn.jtvnw.net/ttv-boxart/509658-144x192.jpg"
    }
  ]
},
  
  {
    tag: "Mittwoch",
    datum: "25.o3.2o26",
    streams: [
    {
      zeit: "17:00 Uhr - 00:00 Uhr",
      titel: "IN B-DAY REINSTREAMEN",
      bild: "https://static-cdn.jtvnw.net/ttv-boxart/509663-144x192.jpg"
    }
  ]
},

  {
    tag: "Donnerstag",
    datum: "26.o3.2o26",
    streams: []
  },

  {
    tag: "Freitag",
    datum: "27.o3.2o26",
     streams: [
    {
      zeit: "08:00 Uhr",
      titel: "JUST CHATTING",
      bild: "https://static-cdn.jtvnw.net/ttv-boxart/509658-144x192.jpg"
      }
    ]
  },

 {
  tag: "Samstag",
  datum: "28.o3.2o26",
  streams: []
  },

{
  tag: "Sonntag",
  datum: "29.o3.2o26",
  streams: [
    {
      zeit: "08:00 Uhr",
      titel: "JUST CHATTING",
      bild: "https://static-cdn.jtvnw.net/ttv-boxart/509658-144x192.jpg"
    }
  ]
}
  
];

const heute = new Date().getDay();
const heuteIndex = heute === 0 ? 6 : heute - 1;
const container = document.getElementById("schedule");

streamplan.forEach((eintrag, index) => {

  const card = document.createElement("div");
  card.classList.add("card");

  if (index === heuteIndex) card.classList.add("today");
  else if (index < heuteIndex) card.classList.add("past");

  let streamsHTML = "";

  if (eintrag.streams.length === 0) {
    streamsHTML = `<div class="no-stream">Kein Stream</div>`;
  } else {

    eintrag.streams.forEach(stream => {
      streamsHTML += `
        <div class="stream-item">
          <img src="${stream.bild}" class="stream-thumb">
          <div class="stream-info">
            <div class="stream-time">${stream.zeit}</div>
            <div class="stream-title">${stream.titel}</div>
          </div>
        </div>
      `;
    });

  }

card.innerHTML = `
  <h3>${eintrag.tag}</h3>
  <div class="day-date">${eintrag.datum}</div>
  ${streamsHTML}
`;

  container.appendChild(card);

});
  
</script>
