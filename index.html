<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dili | Streamplan</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Playfair+Display:wght@600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="dark">

<div id="liveBanner" class="live-banner">
🔴 LIVE auf Twitch – <a href="https://www.twitch.tv/dili" target="_blank">Jetzt zuschauen</a>
</div>
  
<div class="sakura">
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
</div>

<div class="fairy-dust">
  <span></span>
  <span></span>
  <span></span>
  <span></span>
</div>

<header class="hero">
  <h1 class="name">Dili</h1>
  <h2 class="subtitle">Streamplan</h2>

<div class="week-container">
  <span class="flower-icon">🌸</span>
  <p class="week-range" id="weekRange"></p>
  <span class="flower-icon">🌸</span>
</div>

  <div class="flower-toggle">
    <img src="blume.png" id="modeFlower" alt="">
  </div>
</header>

<main>
  <section class="schedule-wrapper">
    <div id="schedule" class="schedule"></div>
  </section>
</main>

<footer>
  <div class="socials">
    <a href="https://www.twitch.tv/dili" target="_blank"><i class="fab fa-twitch"></i></a>
    <a href="https://www.instagram.com/dilara.ls" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://www.youtube.com/@dilarals" target="_blank"><i class="fab fa-youtube"></i></a>
    <a href="https://www.tiktok.com/@diilarals" target="_blank"><i class="fab fa-tiktok"></i></a>
    <a href="https://discord.com/invite/dili" target="_blank"><i class="fab fa-discord"></i></a>
  </div>
  <p>© 2026 Dili</p>
</footer>

<script>
const flower = document.getElementById("modeFlower");
flower.addEventListener("click", () => {
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
});

function getWeekRange() {
  const today = new Date();
  const day = today.getDay();
  const diffToMonday = day === 0 ? -6 : 1 - day;

  const monday = new Date(today);
  monday.setDate(today.getDate() + diffToMonday);

  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);

  const format = (date) =>
    date.toLocaleDateString("de-DE", {
      day: "2-digit",
      month: "2-digit",
      year: "numeric"
    });

  document.getElementById("weekRange").textContent =
    format(monday) + " – " + format(sunday);
}

getWeekRange();

const streamplan = [
  {
    tag: "Montag",
    streams: [
      {
        zeit: "18:00",
        titel: "Just Chatting",
        bild: "https://static-cdn.jtvnw.net/ttv-boxart/509658-144x192.jpg"
      }
    ]
  },

  {
    tag: "Dienstag",
    streams: [
      {
        zeit: "19:00",
        titel: "GTA V",
        bild: "https://static-cdn.jtvnw.net/ttv-boxart/32982-144x192.jpg"
      }
    ]
  },

  {
    tag: "Mittwoch",
    streams: []
  },

  {
    tag: "Donnerstag",
    streams: [
      {
        zeit: "14:00",
        titel: "Just Chatting",
        bild: "https://static-cdn.jtvnw.net/ttv-boxart/509658-144x192.jpg"
      },
      {
        zeit: "15:00",
        titel: "GTA V",
        bild: "https://static-cdn.jtvnw.net/ttv-boxart/32982-144x192.jpg"
      }
    ]
  },

  {
    tag: "Freitag",
    streams: [
      {
        zeit: "18:00",
        titel: "Art Stream",
        bild: "https://static-cdn.jtvnw.net/ttv-boxart/509660-144x192.jpg"
      }
    ]
  },

  { tag: "Samstag", streams: [] },
  { tag: "Sonntag", streams: [] }
];;

const heute = new Date().getDay();
const heuteIndex = heute === 0 ? 6 : heute - 1;
const container = document.getElementById("schedule");

streamplan.forEach((eintrag, index) => {

  const card = document.createElement("div");
  card.classList.add("card");

  if (index === heuteIndex) card.classList.add("today");
  else if (index < heuteIndex) card.classList.add("past");

  let streamsHTML = "";

  if (eintrag.streams.length === 0) {
    streamsHTML = `<div class="no-stream">Kein Stream</div>`;
  } else {

    eintrag.streams.forEach(stream => {
      streamsHTML += `
        <div class="stream-item">
          <img src="${stream.bild}" class="stream-thumb">
          <div class="stream-info">
            <div class="stream-time">${stream.zeit}</div>
            <div class="stream-title">${stream.titel}</div>
          </div>
        </div>
      `;
    });

  }

  card.innerHTML = `
    <h3>${eintrag.tag}</h3>
    ${streamsHTML}
  `;

  container.appendChild(card);

});
  
</script>

</body>
</html>
